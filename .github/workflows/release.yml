name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  Build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cargo build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Archive
        run: |
          cp target/${{ matrix.target }}/release/zola .
          tar -czf zola-${{ github.ref_name }}-${{ matrix.target }}.tar.gz zola

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zola-${{ github.ref_name }}-${{ matrix.target }}
          path: zola-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  Release:
    needs: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "Built from commit ${{ github.sha }}"
