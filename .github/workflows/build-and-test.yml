name: Build & Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  Tests:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo build
        run: cargo build --all --target aarch64-apple-darwin

      - name: Cargo test
        run: cargo test --all
